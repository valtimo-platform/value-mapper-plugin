name: Build and publish frontend

on:
  push:
    paths:
      - 'frontend/**'
    branches:
      - v12
      - main

jobs:
  # -------------------------------------------------------------
  # Using GitHub's API is not supported for push events
  # -------------------------------------------------------------
  #
  # ----------------------------------------------------------------------------------------------
  # Using local .git history
  # ----------------------------------------------------------------------------------------------
  # Event `push`: Compare the preceding remote commit -> to the current commit of the main branch
  # ----------------------------------------------------------------------------------------------
  changed_files:
    runs-on: ubuntu-latest  # windows-latest || macos-latest
    name: Test changed-files
    outputs:
      matrix: ${{ steps.changed-files.outputs.all_changed_files }}
      any_changed: ${{ steps.changed-files.outputs.any_changed }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # OR "2" -> To retrieve the preceding commit.

      - name: Get changed files
        id: changed-files
        with:
          dir_names: 'true'
          dir_names_max_depth: '2'
          matrix: 'true'
          path: 'frontend/projects'
        uses: tj-actions/changed-files@v45
      # NOTE: `since_last_remote_commit: true` is implied by default and falls back to the previous local commit.

  Build-and-publish:
    if: needs.changed_files.outputs.any_changed == 'true'
    runs-on: ubuntu-latest
    needs: changed_files
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        value: ${{ fromJSON(needs.changed_files.outputs.matrix) }}
    name: Build and publish

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'

      - run: npm install
        working-directory: frontend

      - run: npm run build --workspace=projects/${{ matrix.value }}
        working-directory: frontend

      - name: Publish
        run: npm publish ${{ matrix.value }}/dist --access public
        working-directory: frontend
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPMJS_SECRET }}
